services:
  api:
    container_name: neon-vertex-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=${MSSQL_CONNECTION:?MSSQL_CONNECTION is required}
      - ConnectionStrings__Redis=redis:6379
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - neon-network

  redis:
    container_name: neon-vertex-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - neon-network

  ef:
    profiles: ["tools"]
    build:
      context: .
      target: migrations
    environment:
      - ConnectionStrings__Default=${MSSQL_CONNECTION:?MSSQL_CONNECTION is required}
    volumes:
      - .:/src
    networks:
      - neon-network

networks:
  neon-network:
    driver: bridge
