services:
  api:
    container_name: coeur-api
    image: coeur-api:latest
    build:
      context: .
      dockerfile: src/Api/Dockerfile
      target: production
      network: host
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: api.coeur.app.br", "http://127.0.0.1:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=${POSTGRES_CONNECTION:?POSTGRES_CONNECTION is required}
      - Jwt__Secret=${JWT__SECRET:?JWT__SECRET is required}
      - Jwt__Issuer=${JWT__ISSUER:-coeur-api}
      - Jwt__Audience=${JWT__AUDIENCE:-coeur-api}
      - Jwt__ExpirationHours=${JWT__EXPIRATIONHOURS:-24}
      - AllowedHosts=${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS:-https://coeur.app.br}
      - Database__AutoMigrate=${DATABASE_AUTO_MIGRATE:-true}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - home-network

networks:
  home-network:
    external: true
