version: '3'

tasks:
  build:
    desc: "Rebuilda a imagem de produção sem cache"
    cmds:
      - docker compose build --no-cache

  up:
    desc: "Sobe a aplicação em produção em background"
    cmds:
      - docker compose up -d

  restart:
    desc: "Reinicia o container"
    cmds:
      - docker compose restart app

  down:
    desc: "Derruba os containers"
    cmds:
      - docker compose down

  down:volumes:
    desc: "Derruba containers e remove volumes"
    cmds:
      - docker compose down -v

  logs:
    desc: "Exibe logs em tempo real"
    cmds:
      - docker compose logs -f app

  shell:
    desc: "Abre shell no container"
    cmds:
      - docker compose exec app /bin/bash

  deploy:
    desc: "Rebuilda e sobe em um comando"
    cmds:
      - task: build
      - task: up

  migration:add:
    desc: "Cria uma nova migration. Uso: task migration:add NAME=NomeDaMigration"
    cmds:
      - dotnet ef migrations add {{.NAME}}

  migration:revert:
    desc: "Reverte a última migration"
    cmds:
      - dotnet ef migrations remove

  migration:list:
    desc: "Lista todas as migrations"
    cmds:
      - dotnet ef migrations list