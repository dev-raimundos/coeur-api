version: '3'

tasks:
  default:
    desc: "Lista todas as tasks disponíveis"
    cmds:
      - task --list
    silent: true

  build:
    desc: "Builda a imagem"
    cmds:
      - docker compose build

  rebuild:
    desc: "Builda a imagem sem cache"
    cmds:
      - docker compose build --no-cache

  start:
    desc: "Sobe a stack em background"
    cmds:
      - docker compose up -d

  stop:
    desc: "Para os containers sem removê-los"
    cmds:
      - docker compose stop

  restart:
    desc: "Reinicia o container da API"
    cmds:
      - docker compose restart api

  down:
    desc: "Derruba a stack"
    cmds:
      - docker compose down

  deploy:
    desc: "Builda e sobe em um comando"
    cmds:
      - task: build
      - task: start

  pull:
    desc: "Faz git pull e reconstrói o container com as alterações"
    cmds:
      - git pull
      - task: rebuild
      - task: start

  logs:
    desc: "Logs da API em tempo real"
    cmds:
      - docker compose logs -f api

  ps:
    desc: "Status dos containers"
    cmds:
      - docker compose ps

  shell:
    desc: "Abre um shell interativo no container da API"
    cmds:
      - docker compose exec api /bin/sh

  migrate:
    desc: "Cria uma nova migration (uso local). Ex: task migrate -- NomeDaMigration"
    cmds:
      - dotnet ef migrations add {{.CLI_ARGS}} --project src/Infrastructure --startup-project src/Api
