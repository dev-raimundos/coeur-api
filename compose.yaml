name: neon-vertex

services:
  api:
    container_name: neon-vertex-api
    image: neon-vertex-api:latest
    build:
      context: .
      target: production
      network: host
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=${MSSQL_CONNECTION:?MSSQL_CONNECTION is required}
      - Jwt__Secret=${JWT__SECRET:?JWT__SECRET is required}
      - Jwt__Issuer=${JWT__ISSUER:-NeonVertexApi}
      - Jwt__Audience=${JWT__AUDIENCE:-NeonVertexApi}
      - Jwt__ExpirationHours=${JWT__EXPIRATIONHOURS:-24}
      - AllowedHosts=${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - home-network

networks:
  home-network:
    external: true
